# Render Blueprint – Sagar Jewellery App Backend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: sagar-jewellery-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard
    region: oregon
    healthCheckPath: /swagger-ui/index.html
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8080"
      - key: MONGODB_URI
        sync: false          # Atlas connection string
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random secret
      - key: JAVA_TOOL_OPTIONS
        value: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError"
