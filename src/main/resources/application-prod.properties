# Prod profile configuration

# Security Config (JWT Access 15m, Refresh 30d)
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=2592000000

# MongoDB Config (with pool sizing for high traffic)
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=sagar_jewellery
spring.data.mongodb.auto-index-creation=true
spring.jpa.hibernate.ddl-auto=update