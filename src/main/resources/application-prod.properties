# Prod profile configuration

# Security Config (JWT Access 15m, Refresh 30d)
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry=${JWT_ACCESS_TOKEN_EXPIRY}
jwt.refresh-token-expiry=${JWT_REFRESH_TOKEN_EXPIRY}

# MongoDB Config (with pool sizing for high traffic)
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=sagar_jewellery
spring.data.mongodb.auto-index-creation=true
spring.jpa.hibernate.ddl-auto=update

# Mail Config
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true